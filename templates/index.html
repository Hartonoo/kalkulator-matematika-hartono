<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Hartono</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #3b82f6;
            --btn-bg: #f1f5f9;
        }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calc { background: var(--card); padding: 2rem; border-radius: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 320px; }
        .display { text-align: right; margin-bottom: 2rem; min-height: 80px; }
        #history-label { font-size: 0.9rem; color: #94a3b8; margin-bottom: 0.5rem; height: 1.2rem; }
        #main-val { font-size: 2.5rem; font-weight: bold; color: var(--text); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem; }
        button { border: none; padding: 1.2rem; border-radius: 1rem; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.2s; background: var(--btn-bg); color: var(--text); }
        button:active { transform: scale(0.95); }
        .btn-op { background: #e2e8f0; color: #10b981; }
        .btn-eq { background: var(--accent); color: white; grid-column: span 2; }
        .btn-ac { color: #ef4444; }
    </style>
</head>
<body>

<div class="calc">
    <div class="display">
        <div id="history-label">{{ a1 }} {{ ops }} {{ a2 }}</div>
        <div id="main-val">{{ hasil if hasil != "" else (a1 if a1 != "" else "0") }}</div>
    </div>

    <form id="calc-form" method="POST">
        <input type="hidden" name="a1" id="h1" value="{{ a1 }}">
        <input type="hidden" name="a2" id="h2" value="{{ a2 }}">
        <input type="hidden" name="ops" id="h_op" value="{{ ops }}">

        <div class="grid">
            <button type="button" class="btn-ac" onclick="resetAll()">AC</button>
            <button type="button" onclick="addNum('7')">7</button>
            <button type="button" onclick="addNum('8')">8</button>
            <button type="button" class="btn-op" onclick="setOp('/')">÷</button>
            
            <button type="button" onclick="addNum('4')">4</button>
            <button type="button" onclick="addNum('5')">5</button>
            <button type="button" onclick="addNum('6')">6</button>
            <button type="button" class="btn-op" onclick="setOp('*')">×</button>
            
            <button type="button" onclick="addNum('1')">1</button>
            <button type="button" onclick="addNum('2')">2</button>
            <button type="button" onclick="addNum('3')">3</button>
            <button type="button" class="btn-op" onclick="setOp('-')">-</button>
            
            <button type="button" onclick="addNum('0')">0</button>
            <button type="button" onclick="addNum('.')">.</button>
            <button type="submit" class="btn-eq">=</button>
            <button type="button" class="btn-op" onclick="setOp('+')">+</button>
        </div>
    </form>
</div>

<script>
    let currentInput = "";

    function addNum(n) {
        currentInput += n;
        document.getElementById('main-val').innerText = currentInput;
        if (document.getElementById('h_op').value === "") {
            document.getElementById('h1').value = currentInput;
        } else {
            document.getElementById('h2').value = currentInput;
        }
    }

    function setOp(op) {
        document.getElementById('h_op').value = op;
        document.getElementById('history-label').innerText = document.getElementById('h1').value + " " + op;
        currentInput = "";
    }

    function resetAll() {
        document.getElementById('h1').value = "";
        document.getElementById('h2').value = "";
        document.getElementById('h_op').value = "";
        document.getElementById('main-val').innerText = "0";
        document.getElementById('history-label').innerText = "";
        currentInput = "";
        window.location.href = "/"; // Refresh total agar data Flask hilang
    }
</script>

</body>
</html>
