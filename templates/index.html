<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Ilmiah Hartono</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: 0.3s; }
        .dark-mode { background: #0f172a; }
        .calc { background: white; padding: 25px; border-radius: 35px; width: 100%; max-width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); transition: 0.3s; }
        .dark-mode .calc { background: #1e293b; color: white; }
        .header-tools { display: flex; justify-content: space-between; margin-bottom: 20px; color: #94a3b8; }
        .mode-text { text-align: center; font-size: 0.7rem; font-weight: 800; color: #94a3b8; margin-bottom: 10px; cursor: pointer; text-transform: uppercase; }
        .display { text-align: right; margin-bottom: 20px; padding: 10px; min-height: 120px; display: flex; flex-direction: column; justify-content: flex-end; }
        #main-val { font-size: 2.2rem; font-weight: 700; color: #1e293b; word-wrap: break-word; overflow-wrap: break-word; }
        .dark-mode #main-val { color: #f1f5f9; }
        #sci-panel { display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        button { border: none; padding: 18px 0; border-radius: 18px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.2s; background: #f8fafc; color: #475569; }
        .dark-mode button { background: #334155; color: #cbd5e1; }
        .btn-sci { color: #6366f1; background: #f1f5f9; font-size: 0.9rem; }
        .btn-op { background: #10b981; color: white; }
        .btn-ac { color: #ef4444; background: #fef2f2; }
        .btn-eq { background: #3b82f6 !important; color: white !important; grid-column: span 2; }
        .icon { cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="calc">
    <div class="header-tools">
        <span class="icon" onclick="toggleTheme()" id="theme-icon">🌙</span>
        <div class="icon">🕒 ⚙️</div>
    </div>

    <div class="mode-text" onclick="toggleSci()">
        <span id="mode-label">Sederhana</span> ⌵
    </div>

    <div class="display">
        <div id="main-val">0</div>
    </div>

    <div id="sci-panel">
        <button class="btn-sci" onclick="press('sin(')">sin</button>
        <button class="btn-sci" onclick="press('cos(')">cos</button>
        <button class="btn-sci" onclick="press('tan(')">tan</button>
        <button class="btn-sci" onclick="press('sqrt(')">√</button>
        <button class="btn-sci" onclick="press('log10(')">log</button>
        <button class="btn-sci" onclick="press('^')">xʸ</button>
        <button class="btn-sci" onclick="press('pi')">π</button>
        <button class="btn-sci" onclick="press('(')">(</button>
    </div>

    <div class="grid">
        <button class="btn-ac" onclick="clearAll()">AC</button>
        <button onclick="del()">⌫</button>
        <button onclick="press(')')">)</button>
        <button class="btn-op" onclick="press('/')">÷</button>
        
        <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
        <button class="btn-op" onclick="press('*')">×</button>
        
        <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
        <button class="btn-op" onclick="press('-')">-</button>
        
        <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
        <button class="btn-op" onclick="press('+')">+</button>
        
        <button onclick="press('0')">0</button><button onclick="press('.')">.</button>
        <button class="btn-eq" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let currentInput = "";
    const display = document.getElementById('main-val');

    function press(v) {
        currentInput += v;
        render();
    }

    function render() {
        // Tampilan simbol yang lebih rapi di layar
        let viewText = currentInput.replace(/pi/g, 'π').replace(/sqrt\(/g, '√(').replace(/log10\(/g, 'log(');
        display.innerText = viewText || "0";
    }

    function clearAll() { currentInput = ""; render(); }
    function del() { currentInput = currentInput.slice(0, -1); render(); }

    function calculate() {
        try {
            if (!currentInput) return;

            // Perbaikan otomatis: Menambah kurung tutup jika kurang
            let checkInput = currentInput;
            const openBrackets = (checkInput.match(/\(/g) || []).length;
            const closeBrackets = (checkInput.match(/\)/g) || []).length;
            for(let i=0; i < (openBrackets - closeBrackets); i++) {
                checkInput += ")";
            }

            // Eksekusi perhitungan otomatis
            let result = math.evaluate(checkInput);
            
            // Format angka agar tidak keluar layar (maks 10 desimal)
            currentInput = math.format(result, {precision: 10}).toString();
            render();
        } catch (e) {
            display.innerText = "Error Format";
            setTimeout(() => render(), 1500);
        }
    }

    function toggleSci() {
        const panel = document.getElementById('sci-panel');
        const label = document.getElementById('mode-label');
        const isHidden = panel.style.display === "none" || panel.style.display === "";
        panel.style.display = isHidden ? "grid" : "none";
        label.innerText = isHidden ? "Ilmiah" : "Sederhana";
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        document.getElementById('theme-icon').innerText = document.body.classList.contains('dark-mode') ? "☀️" : "🌙";
    }
</script>
</body>
</html>
