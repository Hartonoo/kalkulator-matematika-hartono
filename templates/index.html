<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Hartono</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .calc { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 360px; position: relative; }
        
        /* Header: Mode & Settings */
        .header-tools { display: flex; justify-content: space-between; align-items: center; color: #94a3b8; margin-bottom: 30px; }
        .mode-text { text-align: center; font-size: 0.7rem; font-weight: 800; letter-spacing: 1px; color: #94a3b8; margin-bottom: 15px; text-transform: uppercase; }

        .display { text-align: right; margin-bottom: 25px; padding: 10px; min-height: 100px; display: flex; flex-direction: column; justify-content: flex-end; }
        #history-text { font-size: 1rem; color: #cbd5e1; min-height: 1.5rem; }
        #main-val { font-size: 3rem; font-weight: 700; color: #1e293b; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        
        button { border: none; padding: 18px 0; border-radius: 18px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.2s; background: #f8fafc; color: #475569; }
        button:active { transform: scale(0.95); background: #f1f5f9; }
        
        /* Warna Spesifik */
        .btn-sci { color: #6366f1; background: #f1f5f9; }
        .btn-op { background: #10b981; color: white; }
        .btn-op-light { color: #10b981; background: #f0fdf4; }
        .btn-ac { color: #ef4444; background: #fef2f2; }
        .btn-eq { background: #3b82f6 !important; color: white !important; grid-column: span 2; border-radius: 20px; }

        /* Icon Simbol */
        .icon { cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="calc">
    <div class="header-tools">
        <span class="icon">🌙</span>
        <div>
            <span class="icon" style="margin-right: 15px;">🕒</span>
            <span class="icon">⚙️</span>
        </div>
    </div>

    <div class="mode-text">
        Sederhana
        <div style="font-size: 0.8rem;">⌵</div>
    </div>

    <div class="display">
        <div id="history-text">{{ a1 }} {{ ops }} {{ a2 }}</div>
        <div id="main-val">{{ hasil if hasil != "" else (a1 if a1 != "" else "0") }}</div>
    </div>

    <form method="POST">
        <input type="hidden" name="a1" id="h1" value="{{ a1 }}">
        <input type="hidden" name="a2" id="h2" value="{{ a2 }}">
        <input type="hidden" name="ops" id="h_op" value="{{ ops }}">

        <div class="grid">
            <button type="button" class="btn-sci" onclick="press('sin(')">sin</button>
            <button type="button" class="btn-sci" onclick="press('cos(')">cos</button>
            <button type="button" class="btn-sci" onclick="press('tan(')">tan</button>
            <button type="button" class="btn-sci" onclick="press('sqrt(')">√</button>
            <button type="button" class="btn-sci" onclick="press('log(')">log</button>
            <button type="button" class="btn-sci" onclick="press('**')">xʸ</button>
            <button type="button" class="btn-sci" onclick="press('3.14')">π</button>
            <button type="button" class="btn-sci" onclick="press('2.71')">e</button>

            <button type="button" class="btn-ac" onclick="window.location.href='/'">AC</button>
            <button type="button" class="btn-op-light" onclick="press('DEL')">⌫</button>
            <button type="button" class="btn-op-light" onclick="setOp('%')">%</button>
            <button type="button" class="btn-op" onclick="setOp('/')">÷</button>
            
            <button type="button" onclick="press('7')">7</button>
            <button type="button" onclick="press('8')">8</button>
            <button type="button" onclick="press('9')">9</button>
            <button type="button" class="btn-op" onclick="setOp('*')">×</button>
            
            <button type="button" onclick="press('4')">4</button>
            <button type="button" onclick="press('5')">5</button>
            <button type="button" onclick="press('6')">6</button>
            <button type="button" class="btn-op" onclick="setOp('-')">-</button>
            
            <button type="button" onclick="press('1')">1</button>
            <button type="button" onclick="press('2')">2</button>
            <button type="button" onclick="press('3')">3</button>
            <button type="button" class="btn-op" onclick="setOp('+')">+</button>
            
            <button type="button" onclick="press('0')">0</button>
            <button type="button" onclick="press('.')">.</button>
            <button type="submit" class="btn-eq">=</button>
        </div>
    </form>
</div>

<script>
    let cur = "";
    function press(v) {
        if(v === 'DEL') cur = cur.slice(0,-1);
        else cur += v;
        document.getElementById('main-val').innerText = cur || "0";
        if (!document.getElementById('h_op').value) document.getElementById('h1').value = cur;
        else document.getElementById('h2').value = cur;
    }
    function setOp(op) {
        document.getElementById('h_op').value = op;
        document.getElementById('history-text').innerText = document.getElementById('h1').value + " " + op;
        cur = "";
    }
</script>
</body>
</html>
