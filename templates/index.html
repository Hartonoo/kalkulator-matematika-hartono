<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Lengkap Hartono</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .calc { background: white; padding: 25px; border-radius: 40px; width: 100%; max-width: 380px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
        .display { text-align: right; padding: 20px; min-height: 140px; display: flex; flex-direction: column; justify-content: flex-end; }
        #history { font-size: 1.1rem; color: #94a3b8; min-height: 1.5rem; margin-bottom: 5px; }
        #result { font-size: 3rem; font-weight: 700; color: #1e293b; overflow: hidden; }
        
        /* Grid 4 kolom agar semua tombol muat */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        button { border: none; padding: 18px 0; border-radius: 20px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.2s; background: #f1f5f9; color: #334155; }
        .btn-sci { color: #6366f1; background: #eef2ff; }
        .btn-op { background: #10b981; color: white; }
        .btn-ac { color: #ef4444; background: #fff1f2; }
        .btn-eq { background: #3b82f6; color: white; }
        
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="calc">
    <div class="display">
        <div id="history"></div>
        <div id="result">0</div>
    </div>

    <div class="grid">
        <button class="btn-sci" onclick="instantSci('sin')">sin</button>
        <button class="btn-sci" onclick="instantSci('cos')">cos</button>
        <button class="btn-sci" onclick="instantSci('tan')">tan</button>
        <button class="btn-sci" onclick="instantSci('sqrt')">√</button>

        <button class="btn-sci" onclick="instantSci('log10')">log</button>
        <button class="btn-sci" onclick="press('^')">xʸ</button>
        <button class="btn-sci" onclick="press('pi')">π</button>
        <button class="btn-sci" onclick="press('e')">e</button>

        <button class="btn-ac" onclick="clearAll()">AC</button>
        <button onclick="del()">⌫</button>
        <button onclick="press('%')">%</button>
        <button class="btn-op" onclick="press('/')">÷</button>
        
        <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
        <button class="btn-op" onclick="press('*')">×</button>
        
        <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
        <button class="btn-op" onclick="press('-')">-</button>
        
        <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
        <button class="btn-op" onclick="press('+')">+</button>
        
        <button onclick="press('0')">0</button>
        <button onclick="press('.')">.</button>
        <button class="btn-eq" style="grid-column: span 2;" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let currentInput = "";
    const resDiv = document.getElementById('result');
    const histDiv = document.getElementById('history');

    function press(v) {
        currentInput += v;
        render();
    }

    function render() {
        // Tampilan simbol yang lebih rapi
        let view = currentInput.replace(/\*/g, '×').replace(/\//g, '÷').replace(/pi/g, 'π');
        resDiv.innerText = view || "0";
    }

    function clearAll() {
        currentInput = "";
        histDiv.innerText = "";
        render();
    }

    function del() {
        currentInput = currentInput.slice(0, -1);
        render();
    }

    // Fungsi otomatis untuk sin, cos, tan, log, sqrt
    function instantSci(type) {
        if (!currentInput) return;
        try {
            let val = math.evaluate(currentInput);
            let result = math.evaluate(`${type}(${val})`);
            
            histDiv.innerText = `${type}(${currentInput})`;
            currentInput = math.format(result, {precision: 10}).toString();
            render();
        } catch (e) {
            resDiv.innerText = "Error";
            setTimeout(() => render(), 1000);
        }
    }

    function calculate() {
        try {
            let result = math.evaluate(currentInput);
            histDiv.innerText = currentInput + " =";
            currentInput = math.format(result, {precision: 10}).toString();
            render();
        } catch (e) {
            resDiv.innerText = "Error";
        }
    }
</script>
</body>
</html>
